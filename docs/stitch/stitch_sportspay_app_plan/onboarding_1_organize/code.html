                    Organize seus rachões

<p class="font-body text-on-surface-variant text-lg leading-relaxed max-w-[90%]">

                </p>
</div>

<div class="bg-surface-container-low rounded-xl p-4 flex items-center gap-4 transition-all hover:bg-surface-container-high">
<div class="bg-primary text-secondary-fixed p-3 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="groups">groups</span>

</div>
</div>
