<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Criar Evento - SportsPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#a4eb9c",
              "secondary-fixed-dim": "#ace700",
              "on-tertiary": "#d4f9ff",
              "error": "#b02500",
              "on-primary-container": "#1f6223",
              "on-error-container": "#520c00",
              "on-surface": "#ffffff",
              "error-dim": "#b92902",
              "on-primary-fixed-variant": "#2a6c2c",
              "on-secondary-container": "#415a00",
              "surface-variant": "#dadddf",
              "on-tertiary-fixed-variant": "#005c64",
              "on-secondary-fixed-variant": "#496400",
              "on-tertiary-container": "#005159",
              "inverse-on-surface": "#9b9d9e",
              "secondary-fixed": "#b9f61d",
              "surface-container-highest": "#333333",
              "secondary-dim": "#3f5700",
              "on-primary-fixed": "#054e12",
              "tertiary-dim": "#005861",
              "on-tertiary-fixed": "#003d43",
              "on-error": "#ffefec",
              "on-background": "#ffffff",
              "tertiary": "#00656f",
              "background": "#121212",
              "secondary": "#B9F61D",
              "outline": "#757778",
              "surface-tint": "#266829",
              "surface-container-low": "#2a2a2a",
              "inverse-surface": "#0c0f10",
              "primary-fixed": "#b2faa9",
              "on-secondary": "#deff97",
              "primary-container": "#1B5E20",
              "surface-container": "#1E1E1E",
              "on-surface-variant": "#b0b0b0",
              "secondary-container": "#b9f61d",
              "tertiary-container": "#10eafe",
              "primary-dim": "#1B5E20",
              "surface": "#121212",
              "surface-container-high": "#252525",
              "primary": "#1B5E20",
              "surface-container-lowest": "#1E1E1E",
              "inverse-primary": "#b2faa9",
              "on-primary": "#ffffff",
              "error-container": "#f95630",
              "tertiary-fixed-dim": "#00dbee",
              "outline-variant": "#333333",
              "on-secondary-fixed": "#324600",
              "tertiary-fixed": "#10eafe",
              "surface-dim": "#121212",
              "surface-bright": "#1a1a1a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .kinetic-gradient {
            background: linear-gradient(145deg, #1B5E20 0%, #0d2e10 100%);
        }
        .bottom-heavy-input:focus-within {
            border-bottom-color: #B9F61D;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-surface">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-4 h-16 w-full fixed top-0 z-50 bg-[#121212] border-b border-white/5">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200 text-white flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-white absolute left-1/2 -translate-x-1/2">Novo Evento</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content (Scrollable Form) -->
<main class="flex-1 mt-16 pb-32 px-4 space-y-6 overflow-y-auto">
<!-- Visual Accent (Asymmetric Breathing Room) -->
<div class="pt-8 pb-2">
<div class="h-1 w-12 bg-secondary-container rounded-full mb-2"></div>
<p class="text-on-surface-variant text-sm font-label">Preencha os detalhes para organizar sua partida.</p>
</div>
<!-- Form Section: Nome -->
<div class="space-y-2">
<label class="block text-sm font-bold font-headline text-on-surface ml-1">Nome do evento</label>
<div class="relative transition-all duration-200 focus-within:translate-x-1">
<input class="w-full h-14 px-4 rounded-xl border-none bg-surface-container-high focus:ring-2 focus:ring-secondary text-white placeholder:text-outline-variant font-body bottom-heavy-input border-b-2 border-transparent transition-colors" placeholder="Ex: Futebol 18/01" type="text"/>
</div>
</div>
<!-- Form Section: Data e Hora -->
<div class="space-y-2">
<label class="block text-sm font-bold font-headline text-on-surface ml-1">Data e hora</label>
<button class="w-full h-14 px-4 rounded-xl bg-surface-container-high flex items-center justify-between group active:scale-[0.99] transition-transform">
<span class="text-white font-body">18/01/2025 às 14:00</span>
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform" data-icon="calendar_today">calendar_today</span>
</button>
</div>
<!-- Form Section: Local -->
<div class="space-y-2">
<div class="flex items-baseline gap-1 ml-1">
<label class="block text-sm font-bold font-headline text-on-surface">Local</label>
<span class="text-xs font-label text-outline-variant">(opcional)</span>
</div>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl border-none bg-surface-container-high focus:ring-2 focus:ring-secondary text-white placeholder:text-outline-variant font-body" placeholder="Ex: Arena Beach Sports" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-outline-variant text-lg" data-icon="location_on">location_on</span>
</div>
</div>
<!-- Form Section: Observações -->
<div class="space-y-2">
<div class="flex items-baseline gap-1 ml-1">
<label class="block text-sm font-bold font-headline text-on-surface">Observações</label>
<span class="text-xs font-label text-outline-variant">(opcional)</span>
</div>
<textarea class="w-full p-4 rounded-xl border-none bg-surface-container-high focus:ring-2 focus:ring-secondary text-white placeholder:text-outline-variant font-body resize-none" placeholder="Notas ou instruções para o evento..." rows="4"></textarea>
</div>
<!-- Bento-style Info Card (Visual Polish) -->
<div class="bg-surface-container-lowest p-4 rounded-xl shadow-sm flex items-start gap-4 border border-white/5">
<div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[#B9F61D]" data-icon="notifications_active">notifications_active</span>
</div>
<div>
<h4 class="font-headline font-bold text-sm text-secondary">Notificações Ativas</h4>
<p class="text-xs text-on-surface-variant mt-1 font-body">Enviaremos lembretes para os participantes 2 horas antes do início.</p>
</div>
</div>
</main>
<!-- BottomNavBar (Sticky Footer CTA) -->
<nav class="fixed bottom-0 left-0 w-full z-50 px-4 pb-8 bg-surface/80 backdrop-blur-md">
<button class="flex flex-row items-center justify-center kinetic-gradient text-white rounded-xl w-full h-14 shadow-lg hover:brightness-110 transition-all active:scale-[0.98] duration-150 group">
<span class="font-['Inter'] font-bold text-sm uppercase tracking-wider">Criar Evento</span>
<span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</nav>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 -z-10 opacity-5">
<svg fill="none" height="200" viewbox="0 0 200 200" width="200" xmlns="http://www.w3.org/2000/svg">
<circle cx="150" cy="50" fill="#B9F61D" r="100"></circle>
</svg>
</div>
</body></html>
