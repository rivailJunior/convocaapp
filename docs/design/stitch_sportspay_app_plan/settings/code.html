<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Configurações - SportsPay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#10eafe",
              "error-container": "#f95630",
              "secondary-dim": "#3f5700",
              "surface-container-high": "#e0e3e4",
              "inverse-on-surface": "#9b9d9e",
              "error-dim": "#b92902",
              "on-primary-fixed": "#054e12",
              "inverse-surface": "#0c0f10",
              "secondary-container": "#b9f61d",
              "on-primary-container": "#1f6223",
              "on-primary": "#d1ffc8",
              "background": "#f5f6f7",
              "on-secondary-container": "#415a00",
              "on-tertiary-container": "#005159",
              "secondary": "#496400",
              "primary-container": "#b2faa9",
              "surface-container-highest": "#dadddf",
              "on-secondary-fixed-variant": "#496400",
              "on-error-container": "#520c00",
              "outline-variant": "#abadae",
              "surface": "#f5f6f7",
              "on-surface-variant": "#595c5d",
              "primary-fixed": "#b2faa9",
              "tertiary": "#00656f",
              "surface-container": "#e6e8ea",
              "on-background": "#2c2f30",
              "primary-dim": "#185c1e",
              "inverse-primary": "#b2faa9",
              "surface-bright": "#f5f6f7",
              "tertiary-dim": "#005861",
              "surface-dim": "#d1d5d7",
              "on-secondary": "#deff97",
              "surface-container-low": "#eff1f2",
              "surface-variant": "#dadddf",
              "surface-tint": "#266829",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#a4eb9c",
              "on-tertiary-fixed": "#003d43",
              "error": "#b02500",
              "secondary-fixed-dim": "#ace700",
              "secondary-fixed": "#b9f61d",
              "on-error": "#ffefec",
              "on-secondary-fixed": "#324600",
              "on-tertiary": "#d4f9ff",
              "tertiary-fixed-dim": "#00dbee",
              "tertiary-container": "#10eafe",
              "on-surface": "#2c2f30",
              "outline": "#757778",
              "primary": "#266829",
              "on-tertiary-fixed-variant": "#005c64",
              "on-primary-fixed-variant": "#2a6c2c"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-shadow {
            box-shadow: 0 8px 24px rgba(44, 47, 48, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-12">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-slate-950 flex items-center w-full px-4 h-16 sticky top-0 z-50">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-primary dark:text-green-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-bold text-on-surface dark:text-white font-headline tracking-tight">Configurações</h1>
</header>
<!-- Header Separation -->
<div class="bg-surface-container-low dark:bg-slate-900 h-[1px] w-full mb-6"></div>
<main class="max-w-2xl mx-auto px-4 space-y-4">
<!-- Section 1: Aparência -->
<section>
<h2 class="text-on-surface-variant font-headline font-bold text-sm mb-3 ml-1 uppercase tracking-wider">Aparência</h2>
<div class="bg-surface-container-lowest rounded-xl kinetic-shadow overflow-hidden">
<!-- Tema Row -->
<div class="flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors group">
<span class="font-medium text-on-surface">Tema</span>
<div class="bg-surface-container-high p-1 rounded-full flex gap-1">
<button class="px-4 py-1.5 rounded-full bg-surface-container-lowest text-on-primary-container text-xs font-bold shadow-sm transition-all active:scale-95">Claro</button>
<button class="px-4 py-1.5 rounded-full text-on-surface-variant text-xs font-medium hover:text-on-surface transition-all">Escuro</button>
</div>
</div>
<!-- Idioma Row -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<span class="font-medium text-on-surface">Idioma</span>
<div class="flex items-center gap-2">
<span class="text-on-surface-variant text-sm">Português (BR)</span>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Section 2: Dados -->
<section>
<h2 class="text-on-surface-variant font-headline font-bold text-sm mb-3 ml-1 uppercase tracking-wider">Dados</h2>
<div class="bg-surface-container-lowest rounded-xl kinetic-shadow overflow-hidden">
<!-- Exportar -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-dim" data-icon="download">download</span>
<span class="font-medium text-on-surface">Exportar grupos e eventos</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Importar -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-dim" data-icon="upload">upload</span>
<span class="font-medium text-on-surface">Importar dados</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<p class="mt-2 ml-4 text-xs text-on-surface-variant font-medium">Faça backup dos seus dados localmente</p>
</section>
<!-- Section 3: Sobre -->
<section>
<h2 class="text-on-surface-variant font-headline font-bold text-sm mb-3 ml-1 uppercase tracking-wider">Sobre</h2>
<div class="bg-surface-container-lowest rounded-xl kinetic-shadow overflow-hidden">
<!-- Versão -->
<div class="flex items-center justify-between p-4">
<span class="font-medium text-on-surface">Versão</span>
<span class="text-on-surface-variant text-sm font-medium">1.0.0</span>
</div>
<!-- Política -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<span class="font-medium text-on-surface">Política de Privacidade</span>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Termos -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<span class="font-medium text-on-surface">Termos de Uso</span>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Feedback -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-low transition-colors active:scale-95 duration-150 group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-dim" data-icon="mail">mail</span>
<span class="font-medium text-on-surface">Enviar Feedback</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-0.5 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Section 4: Futuro -->
<section class="opacity-60 grayscale-[0.5]">
<h2 class="text-on-surface-variant font-headline font-bold text-sm mb-3 ml-1 uppercase tracking-wider">Futuro</h2>
<div class="bg-surface-container-low rounded-xl kinetic-shadow overflow-hidden">
<!-- Sincronizar -->
<div class="flex items-center justify-between p-4 cursor-not-allowed">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="cloud">cloud</span>
<span class="font-medium text-outline">Sincronizar na nuvem</span>
</div>
<span class="bg-surface-container-high text-on-surface-variant text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Em breve</span>
</div>
<!-- Notificações -->
<div class="flex items-center justify-between p-4 cursor-not-allowed">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="notifications">notifications</span>
<span class="font-medium text-outline">Notificações</span>
</div>
<span class="bg-surface-container-high text-on-surface-variant text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Em breve</span>
</div>
</div>
</section>
<!-- Decorative Action Hub -->
<div class="pt-8 flex justify-center">
<div class="w-12 h-1 bg-surface-container-high rounded-full opacity-50"></div>
</div>
</main>
<!-- FAB (Suppressed as per rules for Settings page) -->
</body></html>
